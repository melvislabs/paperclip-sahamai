name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @sahamai/shared

      - name: Build worker
        run: npm run build -w @sahamai/worker

      - name: Build api
        run: npm run build -w @sahamai/api

      - name: Test
        run: npm test

      - name: Runtime smoke check
        run: npm run smoke:runtime -w @sahamai/api
