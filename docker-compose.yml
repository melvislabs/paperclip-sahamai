services:
  postgres:
    image: postgres:16-alpine
    container_name: sahamai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sahamai
      POSTGRES_PASSWORD: sahamai_dev_pass
      POSTGRES_DB: sahamai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahamai -d sahamai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
